services:
  db:
    image: postgres:16
    container_name: big_brother_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-big_brother}
      POSTGRES_USER: ${DB_USERNAME:-bigbrother}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - big_brother_db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-bigbrother} -d ${DB_DATABASE:-big_brother}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  big_brother_db:
    driver: local
